site_name: Cursus Daemon
theme:
  name: readthedocs
  color_mode: dark


nav:
  - Home: index.md
  - API Reference:
    - Starter: api/starter.md

plugins:
  - search
  - include-markdown
  - mkdocstrings:
        handlers:
          python:
            paths: ["src/cursusd/"]

markdown_extensions:
  - admonition
